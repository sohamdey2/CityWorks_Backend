spring.application.name=ApiGateway
server.port=7171
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.config.import=optional:configserver:http://localhost:8888


# Routes for Asset Service
spring.cloud.gateway.server.webflux.routes[0].id=ASSETSERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AssetService
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/assets/**

# Routes for Asset Inspection Service
spring.cloud.gateway.server.webflux.routes[1].id=ASSETINSPECTION
spring.cloud.gateway.server.webflux.routes[1].uri=lb://AssetInspection
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/inspection_record/**

# Routes for Maintenance Record Service
spring.cloud.gateway.server.webflux.routes[2].id=MAINTENANCERECORD
spring.cloud.gateway.server.webflux.routes[2].uri=lb://MaintenanceRecord
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/maintenance_records/**

# Routes for Completion Evidence Service
spring.cloud.gateway.server.webflux.routes[3].id=COMPLETIONEVIDENCE
spring.cloud.gateway.server.webflux.routes[3].uri=lb://CompletionEvidence
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/completion_evidence/**

# Routes for Completion Evidence Service
