# Routes for Task Service
spring.cloud.gateway.server.webflux.routes[6].id=TASK-SERVICE
spring.cloud.gateway.server.webflux.routes[6].uri=lb://Task-Service
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/tasks/**

# Routes for Service Request Service
spring.cloud.gateway.server.webflux.routes[7].id=SERVICE-REQUEST-SERVICE
spring.cloud.gateway.server.webflux.routes[7].uri=lb://service-request-service
